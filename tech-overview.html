<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Overview · Ticket Sasa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="ts-shell-root"></div>
<script src="js/config.js"></script>

<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/shell.js"></script>
<script>
const STATUS_LABEL = { P:'Pending', A:'Assigned', I:'In Progress', C:'Completed' };
const STATUS_MAP   = { P:'pending', A:'assigned', I:'progress', C:'completed' };

(async () => {
  const user = await TicketSasaAuth.requireAuth(); if (!user) return;
  if (TicketSasaAuth.getEffectiveRole(user) !== 'T') { location.href = 'tickets.html'; return; }
  const esc     = TicketSasaShell.escapeHtml;
  const content = TicketSasaShell.render(user, { activeHref: 'tech-overview.html' });

  const firstName = esc(user.first_name || user.username);

  content.innerHTML = `
    <div class="ts-topbar">
      <div>
        <div class="ts-eyebrow">Technician workspace</div>
        <h1 class="ts-page-title">Good day, ${firstName} 👋</h1>
      </div>
    </div>

    <!-- KPI row skeleton -->
    <div class="row g-3 mb-4" id="kpi-row">
      ${[1,2,3,4].map(()=>`<div class="col-6 col-md-3"><div class="ts-skeleton" style="height:90px;border-radius:14px"></div></div>`).join('')}
    </div>

    <!-- Recent assignments -->
    <h2 class="h5 mb-3" style="font-weight:700;letter-spacing:-.02em">My Assignments</h2>
    <div id="assignments-region"><div class="ts-skeleton" style="height:160px;border-radius:14px"></div></div>`;

  try {
    const data        = await TicketSasaAPI.listAssignments();
    const assignments = Array.isArray(data) ? data : (data.results || []);

    // Fetch ticket details for KPIs
    const tickets = await Promise.all(
      assignments.map(a => TicketSasaAPI.getTicket(a.ticket).catch(() => null))
    ).then(ts => ts.filter(Boolean));

    const total     = tickets.length;
    const pending   = tickets.filter(t => t.status === 'P' || t.status === 'A').length;
    const inProg    = tickets.filter(t => t.status === 'I').length;
    const completed = tickets.filter(t => t.status === 'C').length;

    // KPIs
    document.getElementById('kpi-row').innerHTML = [
      { label:'Total assigned', value:total,     color:'var(--ts-purple)' },
      { label:'Pending',        value:pending,    color:'#B7860B'          },
      { label:'In progress',    value:inProg,     color:'var(--ts-purple)' },
      { label:'Completed',      value:completed,  color:'var(--ts-green)'  },
    ].map(k => `
      <div class="col-6 col-md-3">
        <div class="ts-panel p-4 text-center">
          <div style="font-size:2rem;font-weight:800;color:${k.color};line-height:1">${k.value}</div>
          <div class="small text-muted mt-1" style="font-weight:600;text-transform:uppercase;font-size:.7rem;letter-spacing:.06em">${k.label}</div>
        </div>
      </div>`).join('');

    if (!tickets.length) {
      document.getElementById('assignments-region').innerHTML = `<div class="ts-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V9Z"/></svg>
        <h3>No assignments yet</h3>
        <p>An admin will assign tickets to you soon.</p>
      </div>`; return;
    }

    document.getElementById('assignments-region').innerHTML = `<div class="ts-panel">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>#</th><th>Ticket</th><th>Location</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${tickets.map(t => `<tr>
              <td><span style="font-family:var(--ts-mono);font-size:.7rem;color:var(--ts-muted)">#${t.id}</span></td>
              <td><strong>${esc(t.title)}</strong></td>
              <td>${esc(t.location || '—')}</td>
              <td><span class="ts-stub ts-stub--${STATUS_MAP[t.status] || 'unknown'}">${STATUS_LABEL[t.status] || '—'}</span></td>
              <td class="text-end"><a href="tech-assignments.html" class="btn btn-primary btn-sm">Work on it</a></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  } catch(err) {
    document.getElementById('kpi-row').innerHTML = '';
    document.getElementById('assignments-region').innerHTML = `<div class="alert alert-danger">${esc(err.message)}</div>`;
  }
})();
</script>
</body></html>
