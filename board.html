<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Board · Ticket Sasa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="ts-shell-root"></div>
<script src="js/config.js"></script>

<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/shell.js"></script>
<script>
const COLS = [
  {code:'P',label:'Pending',     cls:'pending'},
  {code:'A',label:'Assigned',    cls:'assigned'},
  {code:'I',label:'In Progress', cls:'progress'},
  {code:'C',label:'Completed',   cls:'completed'},
];
(async () => {
  const user = await TicketSasaAuth.requireAuth(); if (!user) return;
  if (!TicketSasaAuth.isStaffRole(user)){location.href='tickets.html';return;}
  const esc     = TicketSasaShell.escapeHtml;
  const content = TicketSasaShell.render(user, { activeHref:'board.html' });

  content.innerHTML = `
    <div class="ts-topbar">
      <div><div class="ts-eyebrow">Workspace</div><h1 class="ts-page-title">Board</h1></div>
      <a href="tickets.html" class="btn btn-outline-secondary btn-sm">List view</a>
    </div>
    <div id="board"><div class="ts-board">${COLS.map(()=>`<div>
      <div class="ts-skeleton mb-3" style="height:28px"></div>
      <div class="ts-skeleton mb-2" style="height:88px"></div>
      <div class="ts-skeleton" style="height:88px"></div>
    </div>`).join('')}</div></div>`;

  try {
    const data    = await TicketSasaAPI.listTickets();
    const tickets = Array.isArray(data)?data:(data.results||[]);
    const groups  = {P:[],A:[],I:[],C:[],U:[]};
    tickets.forEach(t => (t.status&&groups[t.status])?groups[t.status].push(t):groups.U.push(t));

    const col = ({label}, list) => `
      <div>
        <div class="ts-column-head">
          <span class="ts-column-title">${label}</span>
          <span class="ts-column-count">${list.length}</span>
        </div>
        <div class="ts-column-stack">
          ${list.length ? list.map(t=>`
            <a href="ticket-detail.html?id=${t.id}" class="ts-card">
              <div class="ts-card-title">${esc(t.title)}</div>
              <div class="ts-card-meta">
                <span>${esc(t.location||'—')}</span>·<span>${esc(t.user||'—')}</span>
                ${Array.isArray(t.ticket_worklogs)&&t.ticket_worklogs.length?`·<span>${t.ticket_worklogs.length} log${t.ticket_worklogs.length===1?'':'s'}</span>`:''}
              </div>
            </a>`).join('')
          :`<div class="ts-column-empty">Empty</div>`}
        </div>
      </div>`;

    const allCols = COLS.map(c=>col(c,groups[c.code]));
    if (groups.U.length) allCols.push(col({label:'Unsorted'},groups.U));
    document.getElementById('board').innerHTML = `<div class="ts-board">${allCols.join('')}</div>`;
  } catch(err) {
    document.getElementById('board').innerHTML = `<div class="alert alert-danger">${TicketSasaShell.escapeHtml(err.message)}</div>`;
  }
})();
</script>
</body></html>
