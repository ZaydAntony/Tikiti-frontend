<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Technicians · Ticket Sasa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="ts-shell-root"></div>
<script src="js/config.js"></script>
<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/shell.js"></script>
<script>
(async () => {
  const user = await TicketSasaAuth.requireAuth(); if (!user) return;
  if (!TicketSasaAuth.isStaffRole(user)) { location.href = 'tickets.html'; return; }
  const esc     = TicketSasaShell.escapeHtml;
  const content = TicketSasaShell.render(user, { activeHref: 'admin-technicians.html' });

  content.innerHTML = `
    <div class="ts-topbar">
      <div><div class="ts-eyebrow">Workspace</div><h1 class="ts-page-title">Technicians</h1></div>
    </div>
    <div id="region"><div class="ts-skeleton" style="height:200px;border-radius:14px"></div></div>`;

  try {
    const data  = await TicketSasaAPI.listTechnicians();
    const techs = Array.isArray(data) ? data : (data.results || []);

    if (!techs.length) {
      document.getElementById('region').innerHTML = `<div class="ts-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/></svg>
        <h3>No technicians yet</h3>
        <p>Register a user with the Technician account type to see them here.</p>
      </div>`; return;
    }

    document.getElementById('region').innerHTML = `
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <div class="ts-panel p-4 text-center">
            <div style="font-size:2rem;font-weight:800;color:var(--ts-purple)">${techs.length}</div>
            <div style="font-size:.82rem;color:var(--ts-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Total Technicians</div>
          </div>
        </div>
      </div>
      <div class="ts-panel">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Username</th><th>First name</th><th>Last name</th></tr></thead>
            <tbody>
              ${techs.map(t => `<tr>
                <td><span style="font-family:var(--ts-mono);font-size:.7rem;color:var(--ts-muted)">#${t.id}</span></td>
                <td><strong>${esc(t.username)}</strong></td>
                <td>${esc(t.first_name || '—')}</td>
                <td>${esc(t.last_name || '—')}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(err) {
    document.getElementById('region').innerHTML = `<div class="alert alert-danger">${esc(err.message)}</div>`;
  }
})();
</script>
</body></html>
