<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Assignments · Ticket Sasa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="ts-shell-root"></div>
<script src="js/config.js"></script>

<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/shell.js"></script>
<script>
(async () => {
  const user = await TicketSasaAuth.requireAuth(); if (!user) return;
  if (!TicketSasaAuth.isStaffRole(user)) { location.href = 'tickets.html'; return; }
  const esc     = TicketSasaShell.escapeHtml;
  const content = TicketSasaShell.render(user, { activeHref: 'assignments.html' });

  content.innerHTML = `
    <div class="ts-topbar">
      <div><div class="ts-eyebrow">Workspace</div><h1 class="ts-page-title">Assignments</h1></div>
      <button class="btn btn-primary btn-sm" id="toggle-form">+ New Assignment</button>
    </div>

    <!-- New assignment form -->
    <div class="ts-panel p-4 mb-3 d-none" id="form-wrap">
      <h2 class="h6 mb-3" style="font-weight:700">Assign technician to ticket</h2>
      <div id="form-alert" class="alert alert-danger d-none small py-2 mb-3"></div>
      <form id="assign-form" class="row g-3 align-items-end">
        <div class="col-md-5">
          <label class="form-label" for="sel-ticket">Ticket</label>
          <select class="form-select" id="sel-ticket" required>
            <option value="">Loading tickets…</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label" for="sel-tech">Technician</label>
          <select class="form-select" id="sel-tech" required>
            <option value="">Loading technicians…</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100" type="submit" id="a-btn">Assign</button>
        </div>
      </form>
    </div>

    <div id="list-region"><div class="ts-skeleton" style="height:200px;border-radius:14px"></div></div>`;

  // Load dropdowns
  const toggleBtn = document.getElementById('toggle-form');
  const formWrap  = document.getElementById('form-wrap');

  toggleBtn.addEventListener('click', async () => {
    formWrap.classList.toggle('d-none');
    if (!formWrap.classList.contains('d-none')) await loadDropdowns();
  });

  async function loadDropdowns() {
    // Tickets — only unassigned ones make sense but we show all for simplicity
    const [ticketsData, techsData] = await Promise.all([
      TicketSasaAPI.listTickets().catch(() => []),
      TicketSasaAPI.listTechnicians().catch(() => []),
    ]);

    const tickets = Array.isArray(ticketsData) ? ticketsData : (ticketsData.results || []);
    const techs   = Array.isArray(techsData)   ? techsData   : (techsData.results   || []);

    const selTicket = document.getElementById('sel-ticket');
    const selTech   = document.getElementById('sel-tech');

    selTicket.innerHTML = `<option value="">Select a ticket…</option>` +
      tickets.map(t => `<option value="${t.id}">#${t.id} — ${esc(t.title)}</option>`).join('');
    selTech.innerHTML = `<option value="">Select a technician…</option>` +
      techs.map(t => `<option value="${t.id}">${esc(t.username)}${t.first_name ? ` (${esc(t.first_name)} ${esc(t.last_name)})` : ''}</option>`).join('');
  }

  document.getElementById('assign-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn     = document.getElementById('a-btn');
    const alertEl = document.getElementById('form-alert');
    alertEl.classList.add('d-none');
    btn.disabled = true; btn.textContent = 'Assigning…';
    try {
      await TicketSasaAPI.createAssignment({
        ticket: Number(document.getElementById('sel-ticket').value),
        user:   Number(document.getElementById('sel-tech').value),
      });
      formWrap.classList.add('d-none');
      document.getElementById('assign-form').reset();
      await loadList();
    } catch(err) {
      alertEl.textContent = err.message || 'Could not create assignment.';
      alertEl.classList.remove('d-none');
    } finally { btn.disabled = false; btn.textContent = 'Assign'; }
  });

  async function loadList() {
    const region = document.getElementById('list-region');
    region.innerHTML = `<div class="ts-skeleton" style="height:150px;border-radius:14px"></div>`;
    try {
      const data = await TicketSasaAPI.listAssignments();
      const list = Array.isArray(data) ? data : (data.results || []);

      if (!list.length) {
        region.innerHTML = `<div class="ts-empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/></svg>
          <h3>No assignments yet</h3>
          <p>Click "+ New Assignment" to assign a technician to a ticket.</p>
        </div>`; return;
      }

      region.innerHTML = `<div class="ts-panel">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead><tr><th>#</th><th>Ticket</th><th>Technician</th><th></th></tr></thead>
            <tbody>
              ${list.map(a => `<tr>
                <td><span style="font-family:var(--ts-mono);font-size:.7rem;color:var(--ts-muted)">${a.id}</span></td>
                <td><a href="ticket-detail.html?id=${a.ticket}">${esc(a.ticket_title || `Ticket #${a.ticket}`)}</a></td>
                <td>${esc(a.technician_name || String(a.user))}</td>
                <td class="text-end">
                  <button class="btn btn-outline-danger btn-sm" data-id="${a.id}">Remove</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;

      region.querySelectorAll('[data-id]').forEach(btn => btn.addEventListener('click', async () => {
        if (!confirm('Remove this assignment?')) return;
        await TicketSasaAPI.deleteAssignment(btn.dataset.id);
        await loadList();
      }));
    } catch(err) {
      region.innerHTML = `<div class="alert alert-danger">${esc(err.message)}</div>`;
    }
  }

  await loadList();
})();
</script>
</body></html>
