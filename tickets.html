<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tickets · Ticket Sasa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="ts-shell-root"></div>
<script src="js/config.js"></script>

<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/shell.js"></script>
<script>
(async () => {
  const user = await TicketSasaAuth.requireAuth(); if (!user) return;
  const isStaff = TicketSasaAuth.isStaffRole(user);
  const isTech  = TicketSasaAuth.isTechnician(user);
  const esc     = TicketSasaShell.escapeHtml;
  const content = TicketSasaShell.render(user, { activeHref:'tickets.html' });
  const sMap    = { P:'pending', A:'assigned', I:'progress', C:'completed' };
  const sLabel  = { P:'Pending', A:'Assigned', I:'In progress', C:'Completed' };

  content.innerHTML = `
    <div class="ts-topbar">
      <div>
        <div class="ts-eyebrow">${isStaff?'Workspace':isTech?'Assigned to me':'My requests'}</div>
        <h1 class="ts-page-title">${isStaff?'All Tickets':'My Tickets'}</h1>
      </div>
      <div class="d-flex gap-2">
        ${!isStaff&&!isTech?`<a href="new-ticket.html" class="btn btn-primary btn-sm">+ New Ticket</a>`:''}
        ${isStaff?`<a href="board.html" class="btn btn-outline-secondary btn-sm">Board view</a>`:''}
      </div>
    </div>
    <div id="region">${[1,2,3,4].map(()=>`<div class="ts-skeleton mb-2" style="height:56px"></div>`).join('')}</div>`;

  try {
    const data    = await TicketSasaAPI.listTickets();
    const tickets = Array.isArray(data) ? data : (data.results||[]);
    const region  = document.getElementById('region');

    if (!tickets.length) {
      region.innerHTML = `<div class="ts-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6M9 16h6M9 8h6M5 4h14a1 1 0 0 1 1 1v15l-3-2-3 2-3-2-3 2-3-2V5a1 1 0 0 1 1-1Z"/></svg>
        <h3>No tickets yet</h3>
        <p>${isStaff?'No tickets submitted yet.':'Submit your first ticket to get started.'}</p>
        ${!isStaff&&!isTech?`<a href="new-ticket.html" class="btn btn-primary mt-3">+ New Ticket</a>`:''}
      </div>`; return;
    }

    region.innerHTML = `<div class="ts-panel">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr>
            <th>#</th><th>Title</th><th>Location</th>
            ${isStaff||isTech?'<th>Submitted by</th>':''}
            ${isStaff||isTech?'<th>Status</th>':''}
            <th></th>
          </tr></thead>
          <tbody>
            ${tickets.map(t=>`<tr>
              <td><span style="font-family:var(--ts-mono);font-size:.7rem;color:var(--ts-muted)">#${t.id}</span></td>
              <td><a href="ticket-detail.html?id=${t.id}">${esc(t.title)}</a></td>
              <td>${esc(t.location||'—')}</td>
              ${isStaff||isTech?`<td>${esc(t.user||'—')}</td>`:''}
              ${isStaff||isTech?`<td>${t.status?`<span class="ts-stub ts-stub--${sMap[t.status]||'unknown'}">${sLabel[t.status]||t.status}</span>`:'<span class="ts-stub ts-stub--unknown">—</span>'}</td>`:''}
              <td class="text-end"><a href="ticket-detail.html?id=${t.id}" class="btn btn-outline-secondary btn-sm">View</a></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  } catch(err) {
    document.getElementById('region').innerHTML = `<div class="alert alert-danger">${TicketSasaShell.escapeHtml(err.message)}</div>`;
  }
})();
</script>
</body></html>
